# Application Name
spring.application.name=${APP_NAME:auth-starter}

# Pagination Configuration
spring.data.web.pageable.serialization-mode=via_dto

# Database (Postgres) Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS Origin Patterns Allowed - In List
# Not in use at the moment, im using the allowed origins in the cors constants, put 'em here for prod
app.cors.allowed-origins=${CORS_ORIGINS_ALLOWED}

# JWT Configuration
jwt.token.secret.key=${JWT_SECRET}
jwt.token.access.token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.token.refresh.token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION}

# Mail Configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Frontend URL Configuration
app.frontend.url=${FRONTEND_URL}

# Google Configuration
app.google.client.id=${GOOGLE_CLIENT_ID}